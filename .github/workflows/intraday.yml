name: Intraday Quotes

on:
  schedule:
    - cron: '0,15,30,45 13-22 * * 1-5'
  workflow_dispatch:

concurrency:
  group: intraday-quotes
  cancel-in-progress: false

jobs:
  quotes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch quotes + fundamentals
        run: python pipeline/fetch_data.py

      - name: Recompute signals + regime
        run: |
          python pipeline/compute_signals.py
          python pipeline/classify_regime.py
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/master.csv data/master.json 2>/dev/null || true
          git add data/regime_current.json data/regime_history.json 2>/dev/null || true
          git add data/signals.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Intraday quotes $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            for i in 1 2 3; do
              git pull --rebase --autostash && git push && break
              echo "Push attempt $i failed, retrying"
              sleep 5
            done
          fi
